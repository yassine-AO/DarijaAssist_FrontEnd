<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="DarijaAssist — Voice AI assistant for Moroccan government services. Speak in Darija, get answers in Darija." />
  <meta name="theme-color" content="#0a0a0f" />
  <title>DarijaAssist — مساعدك الصوتي</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Loading Overlay -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-content">
      <div class="loading-logo">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="22" stroke="url(#grad-load)" stroke-width="2" opacity="0.3"/>
          <path d="M24 10 C24 10 18 16 18 24 C18 32 24 38 24 38 C24 38 30 32 30 24 C30 16 24 10 24 10Z" fill="url(#grad-load)" opacity="0.8"/>
          <defs>
            <linearGradient id="grad-load" x1="0" y1="0" x2="48" y2="48">
              <stop offset="0%" stop-color="#6366f1"/>
              <stop offset="100%" stop-color="#a78bfa"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="loading-spinner"></div>
      <p class="loading-text">تحميل النماذج...</p>
      <p class="loading-subtext">Loading AI models</p>
      <div class="loading-models" id="loading-models"></div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="app hidden">

    <!-- Header -->
    <header class="header" id="header">
      <div class="header-inner">
        <div class="header-brand">
          <div class="brand-icon">
            <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
              <path d="M24 10 C24 10 18 16 18 24 C18 32 24 38 24 38 C24 38 30 32 30 24 C30 16 24 10 24 10Z" fill="url(#grad-brand)" opacity="0.9"/>
              <defs>
                <linearGradient id="grad-brand" x1="0" y1="0" x2="48" y2="48">
                  <stop offset="0%" stop-color="#6366f1"/>
                  <stop offset="100%" stop-color="#a78bfa"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <span class="brand-name">DarijaAssist</span>
        </div>
        <div class="header-status" id="header-status">
          <span class="status-dot online"></span>
          <span class="status-label">جاهز</span>
        </div>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="main" id="main-content">

      <!-- Idle State -->
      <section id="state-idle" class="state state-idle active">
        <div class="idle-hero">
          <h1 class="idle-title">سولني أي حاجة</h1>
          <p class="idle-subtitle">Ask me anything about government services</p>
        </div>

        <div class="services-grid" id="services-grid">
          <!-- Populated by JS -->
        </div>
      </section>

      <!-- Listening State -->
      <section id="state-listening" class="state state-listening">
        <div class="listening-container">
          <p class="listening-label">كنسمع ليك...</p>
          <div class="waveform-container" id="waveform-container">
            <canvas id="waveform-canvas" class="waveform-canvas"></canvas>
          </div>
          <p class="listening-hint">اضغط باش توقف</p>
        </div>
      </section>

      <!-- Processing State -->
      <section id="state-processing" class="state state-processing">
        <div class="processing-container">
          <div class="processing-ripple">
            <span></span><span></span><span></span>
          </div>
          <p class="processing-label">كنفكر...</p>
          <p class="processing-sublabel">Processing your question</p>
        </div>
      </section>

      <!-- Answer State -->
      <section id="state-answer" class="state state-answer">
        <div class="answer-container">
          <div class="answer-card" id="answer-card">
            <div class="answer-audio-indicator" id="answer-audio-indicator">
              <div class="audio-bars">
                <span></span><span></span><span></span><span></span><span></span>
              </div>
              <span class="audio-label">كيتكلم...</span>
            </div>
            <div class="answer-text" id="answer-text" dir="rtl"></div>
            <div class="answer-source" id="answer-source"></div>
          </div>
          <button class="btn-ask-again" id="btn-ask-again">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1 4 1 10 7 10"></polyline>
              <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
            </svg>
            سول سؤال جديد
          </button>
        </div>
      </section>

      <!-- Error State -->
      <section id="state-error" class="state state-error">
        <div class="error-container">
          <div class="error-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="15" y1="9" x2="9" y2="15"></line>
              <line x1="9" y1="9" x2="15" y2="15"></line>
            </svg>
          </div>
          <p class="error-message" id="error-message">وقع مشكل</p>
          <p class="error-detail" id="error-detail"></p>
          <button class="btn-retry" id="btn-retry">عاود</button>
        </div>
      </section>

    </main>

    <!-- Mic Button (Floating) -->
    <div class="mic-area" id="mic-area">
      <button class="mic-button" id="mic-button" aria-label="Record voice message">
        <svg class="mic-icon" id="mic-icon-record" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
          <line x1="12" y1="19" x2="12" y2="23"></line>
          <line x1="8" y1="23" x2="16" y2="23"></line>
        </svg>
        <svg class="mic-icon hidden" id="mic-icon-stop" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="6" width="12" height="12" rx="2"></rect>
        </svg>
      </button>
      <div class="mic-pulse" id="mic-pulse"></div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
